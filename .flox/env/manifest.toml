schema-version = "1.11.0"

[install]
# `sbx` and `sbx-helpers` are installed as locally-built Nix-store
# references. Both store paths are GC-rooted by the `./result-sbx` and
# `./result-sbx-helpers` symlinks in ~/dev/builds/build-sbx. If those
# symlinks are removed, these paths become eligible for `nix-collect-
# garbage` and this environment will fail to activate. To re-pin:
# rebuild in the build repo and replace the store paths below.
#
# `sbx` is the syumai/sbx CLI — kept available as a user-facing escape
# hatch for direct sandbox-exec policy construction. The helpers below
# no longer wrap it; they call /usr/bin/sandbox-exec directly with
# hand-written SBPL policies (because sbx has no way to allow the
# process-fork operation except via --allow-all).
sbx.store-path = "/nix/store/5dwg6sb6ysvm3h5aaaxa6mp88kl8rhi0-sbx-unstable-2026-04-13"
sbx.systems = ["aarch64-darwin", "x86_64-darwin"]

sbx-helpers.store-path = "/nix/store/53fjacxa7m0i0zzpnj60yxsikfhv0gd6-sbx-helpers"
sbx-helpers.systems = ["aarch64-darwin", "x86_64-darwin"]

# sbx-proxy: CONNECT-style hostname allowlisting proxy. Started on
# demand by sbx-agent when --net-allow-host / SBX_NET_ALLOW_HOSTS is
# set. Must be on PATH so sbx-agent can find it by name.
sbx-proxy.store-path = "/nix/store/ggf0dla4kswrhrrhlym4xp2s5ip0a5ww-sbx-proxy-0.1.0"
sbx-proxy.systems = ["aarch64-darwin", "x86_64-darwin"]
crush.pkg-path = "crush"
codex.pkg-path = "codex"
nullclaw.pkg-path = "flox/nullclaw"
nullclaw.pkg-group = "nullclaw"
nanocoder.pkg-path = "flox/nanocoder"
nanocoder.pkg-group = "nanocoder"
opencode.pkg-path = "opencode"
zeroclaw.pkg-path = "zeroclaw"
claude-code.pkg-path = "claude-code"
gemini-cli.pkg-path = "gemini-cli"
gh.pkg-path = "gh"

[profile]
# Iteration surface for per-agent sandbox wrappers. Each function below
# calls `sbx-agent` with agent-specific state-dir allowances. Profile
# functions are edit-and-reactivate (no rebuild needed), so fixing a
# wrong state dir is fast.
#
# IMPORTANT: profile functions are only available in interactive
# `flox activate` subshells. They are NOT reachable via
# `flox activate -- cmd` invocations (including from MCP tools),
# because profile scripts are sourced by your shell at subshell
# startup, which that form skips. For non-interactive use, graduate
# the function to a packaged helper in sbx-helpers.nix.
#
# Agent wrappers all call `_sbx_agent_args`, a helper function that
# emits common sbx-agent flags driven by SBX_* environment variables.
# Each wrapper then adds its tool-specific --write paths and binary.
# Adding a new SBX_* env var means editing `_sbx_agent_args` once —
# all 11 wrappers pick it up automatically.
#
# Supported SBX_* environment variables:
#
#     SBX_NET          Network mode. Default: allow.
#                      Values: block | allow | host:port[,host:port]...
#                      Host form only accepts '*' or 'localhost'.
#                      Examples:
#                          SBX_NET=block            no network
#                          SBX_NET='*:443'          HTTPS only, any host
#                          SBX_NET='localhost:*'    loopback only
#                      Numeric IPs, DNS names, and CIDRs are REJECTED
#                      by sandbox-exec's SBPL parser.
#
#     SBX_STRICT       If set (any non-empty value), adds --strict-reads.
#                      Switches to a deny-default read policy borrowed
#                      from phylum-dev/birdcage. Reads are scoped to
#                      macOS system dylibs, /nix/store, $FLOX_ENV, $PWD,
#                      $TMPDIR, each --write, and each --read. Closes
#                      the "agent greps ~/.ssh and exfils to *:443"
#                      gap. WILL break tools that expect to read $HOME
#                      config files (git wants ~/.gitconfig, etc.) —
#                      iterate in this file by adding --read lines.
#
#     SBX_PASSENV      Space-separated list of env var names to pass
#                      into the sandbox. By default, only a safe
#                      whitelist (PATH, HOME, USER, SHELL, TERM,
#                      TMPDIR, LANG, LC_*, FLOX_ENV, ...) is passed.
#                      API keys, tokens, SSH_AUTH_SOCK, and AWS_*
#                      vars are DROPPED unless listed here.
#                      Example: SBX_PASSENV="ANTHROPIC_API_KEY"
#
#     SBX_TIMEOUT      Wall-clock timeout. GNU duration string:
#                      30s / 5m / 2h. On expiry: SIGTERM then SIGKILL
#                      5s later.
#
#     SBX_MAX_CPU      RLIMIT_CPU in seconds (ulimit -t).
#     SBX_MAX_PROCS    RLIMIT_NPROC (ulimit -u).
#     SBX_MAX_FILES    RLIMIT_NOFILE (ulimit -n).
#     (No SBX_MAX_MEM — macOS kernel does not implement settable
#     RLIMIT_AS / RLIMIT_DATA / RLIMIT_RSS.)
#
#     SBX_LOG_MAX_SIZE Rotation threshold applied to both the agent
#                      audit log ($FLOX_ENV_CACHE/sbx-agent.log) AND
#                      the sbx-proxy event log. Accepts raw bytes or
#                      a NUMBER with a K/M/G suffix (case-insensitive).
#                      Examples:
#                          SBX_LOG_MAX_SIZE=50M
#                          SBX_LOG_MAX_SIZE=1G
#                          SBX_LOG_MAX_SIZE=0    (disable rotation)
#                      Default when unset: 10 MiB. Both sides use a
#                      .log.1-only scheme — the most recent rotated
#                      copy survives, older history is lost on the
#                      next rotation. Pick a cap large enough to
#                      survive a bursty workload without rotating
#                      mid-session. For forensic retention, use an
#                      external log collector and keep this high.
#
#     SBX_NET_ALLOW_HOSTS
#                      Space-separated list of hostnames. Starts
#                      sbx-proxy (CONNECT-style HTTPS allowlist)
#                      automatically and routes the sandboxed child's
#                      HTTPS traffic through it. Closes the gap that
#                      sandbox-exec's SBPL can't filter by hostname.
#                      Supports wildcards (*.example.com). Mutually
#                      exclusive with SBX_NET.
#                      Example: SBX_NET_ALLOW_HOSTS='api.anthropic.com'
#                      End-to-end TLS is preserved; the proxy never
#                      terminates the connection. See the audit log at
#                      $FLOX_ENV_CACHE/sbx-proxy.log for per-connection
#                      allow/deny events.
#
#     SBX_JAIL_HOME    If set (any non-empty value), redirects each
#                      agent's state directory into a per-agent subdir
#                      of $FLOX_ENV_CACHE/agent-state/ (or SBX_STATE_DIR
#                      if set). Agents that support a native config-dir
#                      env var are redirected cleanly:
#                        claude   → CLAUDE_CONFIG_DIR
#                        gh       → GH_CONFIG_DIR
#                        opencode → XDG_CONFIG_HOME et al.
#                        nullclaw → NULLCLAW_HOME
#                        zeroclaw → ZEROCLAW_CONFIG_DIR
#                        nanocoder→ NANOCODER_CONFIG_DIR
#                      Agents without a native override (codex, gemini,
#                      crush, openclaw, nanobot) fall back to HOME
#                      override (HOME=$state_dir), which means reads
#                      of $HOME/.gitconfig etc. from inside the jail
#                      will not find the real files. Use SBX_PASSENV
#                      with GIT_CONFIG_GLOBAL or similar to restore
#                      specific reads if needed.
#                      Default when unset: agents write to their normal
#                      $HOME dirs (current behavior, no redirect).
#
#     SBX_STATE_DIR    Override the root directory for jailed agent
#                      state. Default when unset: $FLOX_ENV_CACHE/
#                      agent-state. Each agent gets a subdir named
#                      after itself ($SBX_STATE_DIR/<agent-name>/).
#                      Set this to a user-private path if FLOX_ENV_CACHE
#                      falls back to /tmp (which is world-readable).
#
# Each wrapper assumes the underlying agent binary (`claude`, `codex`,
# etc.) is installed and on $PATH. This env does not install them.
#
# State-dir confidence (empirically verified 2026-04-15 via fake-HOME
# bootstrap trace; see ROADMAP item #3 notes):
#   Verified correct: claude-jail, copilot-jail, codex-jail,
#                     gemini-jail, crush-jail, nullclaw-jail,
#                     zeroclaw-jail, opencode-jail, nanocoder-jail
#   Untested: openclaw-jail (package marked insecure, not in catalog),
#             nanobot-jail (not in catalog)
# Several wrappers still carry vestigial --write paths (e.g.
# $HOME/.config/codex, $HOME/.config/gemini, $HOME/.cache/crush) that
# the real binaries never touched. Those are harmless over-permissive
# allowances; leave them in for forward-compat unless a future audit
# tightens the policy.
# When a wrapper fails on first use because it can't write somewhere,
# edit the corresponding function below, `exit` the shell, and
# `flox activate` again to pick up the change.
common = '''
  # ----- shared: populate global _sbx_args array from SBX_* env vars -----
  # Each wrapper calls _sbx_agent_args (which clears and populates
  # _sbx_args) and then expands "${_sbx_args[@]}" quoted. We use an
  # array (not unquoted stdout + word-splitting) because a value like
  # SBX_NET='*:443' would otherwise glob-expand if the caller's cwd
  # contained a matching file (e.g. /tmp/collision:443). Array
  # expansion sidesteps globbing and word-splitting entirely.
  _sbx_agent_args() {
    _sbx_args=()
    [[ -n "${SBX_STRICT:-}"    ]] && _sbx_args+=(--strict-reads)
    [[ -n "${SBX_TIMEOUT:-}"   ]] && _sbx_args+=(--timeout "$SBX_TIMEOUT")
    [[ -n "${SBX_MAX_CPU:-}"   ]] && _sbx_args+=(--max-cpu "$SBX_MAX_CPU")
    [[ -n "${SBX_MAX_PROCS:-}" ]] && _sbx_args+=(--max-procs "$SBX_MAX_PROCS")
    [[ -n "${SBX_MAX_FILES:-}" ]] && _sbx_args+=(--max-files "$SBX_MAX_FILES")
    [[ -n "${SBX_LOG_MAX_SIZE:-}" ]] && _sbx_args+=(--log-max-size "$SBX_LOG_MAX_SIZE")
    local v
    # SBX_PASSENV is space-separated. Env var NAMES contain no
    # whitespace or shell metacharacters, so unquoted word-splitting
    # here is safe.
    for v in ${SBX_PASSENV:-}; do
      _sbx_args+=(--passenv "$v")
    done
    # SBX_NET_ALLOW_HOSTS takes precedence over SBX_NET. If set, we
    # use proxy mode (sbx-agent auto-starts sbx-proxy) and do NOT
    # pass --net — sbx-agent will internally configure the sandbox
    # to only allow localhost:<proxy-port>.
    if [[ -n "${SBX_NET_ALLOW_HOSTS:-}" ]]; then
      local h
      for h in ${SBX_NET_ALLOW_HOSTS}; do
        _sbx_args+=(--net-allow-host "$h")
      done
    else
      _sbx_args+=(--net "${SBX_NET:-allow}")
    fi
  }

  # ----- shared: SBX_JAIL_HOME state-dir redirect ------------------
  # When SBX_JAIL_HOME is set, each agent's state writes are
  # redirected into a per-agent subdir of $FLOX_ENV_CACHE/agent-state
  # (or $SBX_STATE_DIR if set). Agents with a native config-dir env
  # var use that; the rest fall back to HOME override. The redirect
  # is injected via an `env KEY=VAL` prefix that runs INSIDE the
  # sandbox — it adds to the scrubbed env without polluting the
  # outer shell and without needing --passenv.
  _sbx_state_dir() {
    local agent="$1"
    local dir="${SBX_STATE_DIR:-${FLOX_ENV_CACHE:-${TMPDIR:-/tmp}}/agent-state}/$agent"
    mkdir -p "$dir"
    printf '%s' "$dir"
  }

  # Populates _sbx_jail_env (command prefix array) and appends
  # --write to _sbx_args. Returns 0 if jail-home is active (caller
  # should use _sbx_jail_env), 1 if inactive (caller uses default
  # --write paths).
  _sbx_jail_write() {
    local agent="$1"
    _sbx_jail_env=()
    [[ -n "${SBX_JAIL_HOME:-}" ]] || return 1
    local state
    state="$(_sbx_state_dir "$agent")"
    _sbx_args+=(--write "$state")
    case "$agent" in
      claude)
        _sbx_jail_env=(env "CLAUDE_CONFIG_DIR=$state") ;;
      gh)
        _sbx_jail_env=(env "GH_CONFIG_DIR=$state") ;;
      opencode)
        mkdir -p "$state/config" "$state/data" "$state/cache" "$state/state"
        _sbx_jail_env=(env "XDG_CONFIG_HOME=$state/config" "XDG_DATA_HOME=$state/data" \
                           "XDG_CACHE_HOME=$state/cache" "XDG_STATE_HOME=$state/state") ;;
      nullclaw)
        _sbx_jail_env=(env "NULLCLAW_HOME=$state") ;;
      zeroclaw)
        _sbx_jail_env=(env "ZEROCLAW_CONFIG_DIR=$state") ;;
      nanocoder)
        _sbx_jail_env=(env "NANOCODER_CONFIG_DIR=$state") ;;
      *)
        _sbx_jail_env=(env "HOME=$state") ;;
    esac
    return 0
  }

  # ----- sbx-here (legacy iteration-surface preset) -----
  # Strict project-dir-only jail: writes restricted to $PWD (no
  # $TMPDIR), network blocked. Ignores SBX_* env vars by design.
  sbx-here() {
    sbx-agent --no-tmpdir --net block -- "$@"
  }

  # ----- Per-agent jails -----
  # Each wrapper populates _sbx_args via _sbx_agent_args, then
  # conditionally redirects state via _sbx_jail_write. When
  # SBX_JAIL_HOME is unset, behavior is identical to the pre-
  # jail-home code — the else branch has the original --write paths.

  # Anthropic Claude Code
  claude-jail() {
    _sbx_agent_args
    if _sbx_jail_write claude; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" claude "$@"
    else
      sbx-agent "${_sbx_args[@]}" --write "$HOME/.claude" -- claude "$@"
    fi
  }

  # OpenAI Codex CLI (HOME override — no native config-dir env var)
  codex-jail() {
    _sbx_agent_args
    if _sbx_jail_write codex; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" codex "$@"
    else
      sbx-agent "${_sbx_args[@]}" --write "$HOME/.codex" --write "$HOME/.config/codex" -- codex "$@"
    fi
  }

  # Google Gemini CLI (HOME override — no native config-dir env var)
  gemini-jail() {
    _sbx_agent_args
    if _sbx_jail_write gemini; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" gemini "$@"
    else
      sbx-agent "${_sbx_args[@]}" --write "$HOME/.gemini" --write "$HOME/.config/gemini" -- gemini "$@"
    fi
  }

  # GitHub Copilot CLI (gh extension) — usage: copilot-jail suggest "..."
  copilot-jail() {
    _sbx_agent_args
    if _sbx_jail_write gh; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" gh copilot "$@"
    else
      sbx-agent "${_sbx_args[@]}" --write "$HOME/.config/gh" -- gh copilot "$@"
    fi
  }

  # Charm.sh Crush (HOME override — no native config-dir env var)
  crush-jail() {
    _sbx_agent_args
    if _sbx_jail_write crush; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" crush "$@"
    else
      sbx-agent "${_sbx_args[@]}" --write "$HOME/.config/crush" --write "$HOME/.local/share/crush" --write "$HOME/.cache/crush" -- crush "$@"
    fi
  }

  # OpenCode (XDG-compliant — redirected via XDG_* env vars)
  opencode-jail() {
    _sbx_agent_args
    if _sbx_jail_write opencode; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" opencode "$@"
    else
      sbx-agent "${_sbx_args[@]}" \
        --write "$HOME/.config/opencode" \
        --write "$HOME/.local/state/opencode" \
        --write "$HOME/.local/share/opencode" \
        --write "$HOME/.cache/opencode" \
        -- opencode "$@"
    fi
  }

  # OpenClaw (HOME override — untested, package not in catalog)
  openclaw-jail() {
    _sbx_agent_args
    if _sbx_jail_write openclaw; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" openclaw "$@"
    else
      sbx-agent "${_sbx_args[@]}" --write "$HOME/.openclaw" --write "$HOME/.config/openclaw" -- openclaw "$@"
    fi
  }

  # NullClaw (native override via NULLCLAW_HOME)
  nullclaw-jail() {
    _sbx_agent_args
    if _sbx_jail_write nullclaw; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" nullclaw "$@"
    else
      sbx-agent "${_sbx_args[@]}" --write "$HOME/.nullclaw" --write "$HOME/.config/nullclaw" -- nullclaw "$@"
    fi
  }

  # ZeroClaw (native override via ZEROCLAW_CONFIG_DIR)
  zeroclaw-jail() {
    _sbx_agent_args
    if _sbx_jail_write zeroclaw; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" zeroclaw "$@"
    else
      sbx-agent "${_sbx_args[@]}" --write "$HOME/.zeroclaw" --write "$HOME/.config/zeroclaw" -- zeroclaw "$@"
    fi
  }

  # Nanobot (HOME override — untested, not in catalog)
  nanobot-jail() {
    _sbx_agent_args
    if _sbx_jail_write nanobot; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" nanobot "$@"
    else
      sbx-agent "${_sbx_args[@]}" --write "$HOME/.nanobot" --write "$HOME/.config/nanobot" -- nanobot "$@"
    fi
  }

  # Nanocoder (native override via NANOCODER_CONFIG_DIR)
  nanocoder-jail() {
    _sbx_agent_args
    if _sbx_jail_write nanocoder; then
      sbx-agent "${_sbx_args[@]}" -- "${_sbx_jail_env[@]}" nanocoder "$@"
    else
      sbx-agent "${_sbx_args[@]}" --write "$HOME/Library/Preferences/nanocoder" -- nanocoder "$@"
    fi
  }
'''

[options]
systems = ["aarch64-darwin", "x86_64-darwin"]
